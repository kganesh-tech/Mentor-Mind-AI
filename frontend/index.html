<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>MentorMind AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(to bottom right,#050816,#0f172a);
    color:white;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:260px;
    background:rgba(17,24,39,0.9);
    backdrop-filter:blur(12px);
    border-right:1px solid #1f2937;
    padding:20px;
}

.sidebar h2{
    font-size:28px;
    color:#8b5cf6;
    margin-bottom:10px;
}

.sidebar p{
    color:#94a3b8;
    margin-bottom:25px;
}

.chat-history{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.history-box{
    background:#1e293b;
    padding:14px;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;
}

.history-box:hover{
    background:#273449;
    transform:translateX(5px);
}

/* CHAT AREA */

.chat-area{
    flex:1;
    padding:25px;
    overflow-y:auto;
    padding-bottom:120px;
}

.hero{
    margin-bottom:30px;
}

.hero h1{
    font-size:40px;
    margin-bottom:10px;

    background:linear-gradient(to right,#ffffff,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    color:#94a3b8;
}

/* OUTPUT */

#output{
    display:flex;
    flex-direction:column;
}

/* MESSAGE */

.message{
    padding:16px 20px;
    margin:12px 0;
    border-radius:18px;
    max-width:70%;
    line-height:1.7;
    animation:fadeIn 0.3s ease;
}

.user{
    background:linear-gradient(to right,#6d5dfc,#8b5cf6);
    margin-left:auto;
    box-shadow:0 0 15px rgba(139,92,246,0.35);
}

.ai{
    background:rgba(31,41,55,0.85);
    border:1px solid #374151;
    backdrop-filter:blur(10px);
    margin-right:auto;
}

/* INPUT AREA */

.input-area{
    position:fixed;
    bottom:0;
    left:260px;
    right:0;

    background:rgba(17,24,39,0.95);
    backdrop-filter:blur(12px);

    padding:15px;
    display:flex;
    gap:10px;
    align-items:center;

    border-top:1px solid #1f2937;
}

input{
    flex:1;
    padding:16px;
    border:none;
    border-radius:14px;
    outline:none;

    background:#1e293b;
    color:white;

    font-size:15px;

    transition:0.3s;
}

input:focus{
    border:1px solid #8b5cf6;
    box-shadow:0 0 12px rgba(139,92,246,0.5);
}

/* BUTTONS */

button{
    padding:12px 16px;
    border:none;
    border-radius:12px;
    cursor:pointer;

    background:linear-gradient(to right,#6d5dfc,#8b5cf6);
    color:white;

    font-weight:500;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    opacity:0.95;
}

/* DIFFICULTY BUTTONS */

#easybutton.active{
    box-shadow:0 0 15px #22c55e;
    border:1px solid #22c55e;
}

#mediumbutton.active{
    box-shadow:0 0 15px #facc15;
    border:1px solid #facc15;
}

#hardbutton.active{
    box-shadow:0 0 15px #ef4444;
    border:1px solid #ef4444;
}

/* ANIMATION */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* MOBILE */

@media(max-width:768px){

    .sidebar{
        display:none;
    }

    .input-area{
        left:0;
    }

    .message{
        max-width:90%;
    }

    .hero h1{
        font-size:30px;
    }

}

</style>

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>MentorMind AI</h2>

        <p>Your Personal AI Learning Coach</p>

        <div class="chat-history">

            <div class="history-box">
                What is Artificial Intelligence?
            </div>

            <div class="history-box">
                Explain JavaScript Closures
            </div>

            <div class="history-box">
                DSA Learning Roadmap
            </div>

        </div>

    </div>

    <!-- MAIN CHAT -->

    <div class="chat-area">

        <div class="hero">

            <h1>Hello, User 👋</h1>

            <p>
                What would you like to learn today?
            </p>

        </div>

        <div id="output"></div>

    </div>

</div>

<!-- INPUT AREA -->

<div class="input-area">

    <input
        id="userinput"
        placeholder="Ask something..."
    />

    <button id="askButton">
        Ask AI
    </button>

    <button id="easybutton">
        Easy
    </button>

    <button id="mediumbutton">
        Medium
    </button>

    <button id="hardbutton">
        Hard
    </button>

</div>

<script>

const output =
document.getElementById("output");

const input =
document.getElementById("userinput");

let selectedDifficulty = "Easy";

/* MESSAGE FUNCTION */

function addMessage(text,type){

    const div =
    document.createElement("div");

    div.classList.add("message",type);

    div.innerText = text;

    output.appendChild(div);

    setTimeout(()=>{

        output.scrollTop =
        output.scrollHeight;

    },50);

}

/* AI CALL */

async function callAI(message){

    try{

        const response =
        await fetch("https://mentor-mind-ai-4.onrender.com/chat",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                message,
                difficulty:selectedDifficulty

            })

        });

        const text =
        await response.text();

        console.log("RAW RESPONSE:",text);

        let data;

        try{

            data = JSON.parse(text);

        }catch(e){

            return "Server returned invalid response ❌";

        }

        return(

            data?.reply ||
            data?.generated_text ||
            data?.error ||
            "No response from AI"

        );

    }catch(err){

        console.log("ERROR:",err);

        return "Backend error ❌";

    }

}

/* ASK BUTTON */

document.getElementById("askButton").onclick =
async function(){

    const question =
    input.value.trim();

    if(!question) return;

    addMessage(question,"user");

    input.value = "";

    const loading =
    document.createElement("div");

    loading.classList.add("message","ai");

    loading.innerText =
    "MentorMind AI is thinking...";

    output.appendChild(loading);

    try{

        const reply =
        await callAI(question);

        loading.remove();

        addMessage(reply,"ai");

    }catch(err){

        loading.remove();

        addMessage("Error calling AI ❌","ai");

        console.log(err);

    }

};

/* DIFFICULTY */

function setDifficulty(level){

    selectedDifficulty = level;

    document
    .querySelectorAll("#easybutton,#mediumbutton,#hardbutton")
    .forEach(btn=>{

        btn.classList.remove("active");

    });

    if(level === "Easy"){

        document
        .getElementById("easybutton")
        .classList.add("active");

    }

    if(level === "Medium"){

        document
        .getElementById("mediumbutton")
        .classList.add("active");

    }

    if(level === "Hard"){

        document
        .getElementById("hardbutton")
        .classList.add("active");

    }

    addMessage(
        "Difficulty set to: " + level,
        "ai"
    );

}

document
.getElementById("easybutton")
.onclick = ()=>setDifficulty("Easy");

document
.getElementById("mediumbutton")
.onclick = ()=>setDifficulty("Medium");

document
.getElementById("hardbutton")
.onclick = ()=>setDifficulty("Hard");

/* ENTER KEY */

input.addEventListener("keydown",function(e){

    if(e.key === "Enter"){

        document
        .getElementById("askButton")
        .click();

    }

});

</script>

</body>
</html>
